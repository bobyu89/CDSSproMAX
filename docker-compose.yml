name: ticdss

services:
  # PostgreSQL 17 + pgvector extension
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ticdss-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticdss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
      POSTGRES_DB: ${POSTGRES_DB:-ticdss}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/00-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticdss} -d ${POSTGRES_DB:-ticdss}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Langfuse needs its own database, share the postgres instance (different DB)
  langfuse-db-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
    entrypoint:
      - sh
      - -c
      - |
        psql -h postgres -U ${POSTGRES_USER:-ticdss} -tc "SELECT 1 FROM pg_database WHERE datname='langfuse'" | grep -q 1 || \
        psql -h postgres -U ${POSTGRES_USER:-ticdss} -c "CREATE DATABASE langfuse"
    restart: "no"

  # MinIO — S3-compatible object storage for keyframes (and future audio
  # blobs). Self-hosted so IRB-protected media never leaves the institution.
  minio:
    image: minio/minio:latest
    container_name: ticdss-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ticdss}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_locally}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6

  minio-bucket-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-ticdss} ${MINIO_ROOT_PASSWORD:-change_me_locally} &&
        mc mb --ignore-existing local/ticdss-keyframes &&
        mc anonymous set download local/ticdss-keyframes
    restart: "no"

  langfuse:
    image: langfuse/langfuse:2
    container_name: ticdss-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-db-init:
        condition: service_completed_successfully
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ticdss}:${POSTGRES_PASSWORD:-change_me_locally}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change_me_locally_a_long_random_string}
      SALT: ${LANGFUSE_SALT:-change_me_locally_another_random_string}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local
