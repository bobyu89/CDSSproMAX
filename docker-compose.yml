name: ticdss

services:
  # PostgreSQL 17 + pgvector extension
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ticdss-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticdss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
      POSTGRES_DB: ${POSTGRES_DB:-ticdss}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/00-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticdss} -d ${POSTGRES_DB:-ticdss}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Langfuse needs its own database, share the postgres instance (different DB)
  langfuse-db-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
    entrypoint:
      - sh
      - -c
      - |
        psql -h postgres -U ${POSTGRES_USER:-ticdss} -tc "SELECT 1 FROM pg_database WHERE datname='langfuse'" | grep -q 1 || \
        psql -h postgres -U ${POSTGRES_USER:-ticdss} -c "CREATE DATABASE langfuse"
    restart: "no"

  langfuse:
    image: langfuse/langfuse:2
    container_name: ticdss-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-db-init:
        condition: service_completed_successfully
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ticdss}:${POSTGRES_PASSWORD:-change_me_locally}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change_me_locally_a_long_random_string}
      SALT: ${LANGFUSE_SALT:-change_me_locally_another_random_string}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

volumes:
  postgres-data:
    driver: local
